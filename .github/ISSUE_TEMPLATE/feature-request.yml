name: ✨ Feature request
description: Suggest a new capability or change.
title: 'feat: <one-line summary>'
labels: ['type:feature', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Before requesting, please check the [Intended Purpose Register](https://github.com/lukasfend/DutyHive/blob/main/docs/quality/intended-purpose-register.md) to see if your idea fits the platform's scope. **DutyHive is explicitly out of scope for medical-device functionality** — see the [non-medical-device statement](https://github.com/lukasfend/DutyHive/blob/main/docs/quality/non-medical-device-statement.md). Requests that cross those guardrails will be declined.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain are you trying to address? Concrete examples beat abstract goals.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      description: What should the platform do differently?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Which surface?
      options:
        - Marketing site (dutyhive.com)
        - Account hub (app.dutyhive.com)
        - Planner (planner.dutyhive.com)
        - Business (business.dutyhive.com)
        - Checklists (checklist.dutyhive.com)
        - Cross-cutting (auth, infra, docs)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why is this the right approach?

  - type: checkboxes
    id: scope-check
    attributes:
      label: Scope check (please tick to confirm)
      options:
        - label: This request does not introduce patient data, clinical decision support, diagnosis, or treatment recommendation features.
          required: true
